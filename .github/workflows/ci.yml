name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    env:
      # Drive every `uv` call to the matrix interpreter; uv auto-downloads managed CPython.
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0   # no floating `v8` major tag yet; pin the exact release
        with:
          version: "0.11.14"   # match local dev + build floor (uv_build>=0.11.14,<0.12.0)
          enable-cache: true
      - name: Sync (locked, reference-free)
        run: uv sync --locked
      - name: Ruff (lint)
        # src/ is polyglot post-ADR-0010 (src/spl + src/web); only lint the Python package.
        run: uv run ruff check src/spl tests
      - name: Ruff (format check)
        run: uv run ruff format --check src/spl tests
      - name: Pyright (strict)
        run: uv run pyright
      - name: Pytest (default suite; reference-free) + coverage
        # Coverage is measured on the reference-free suite only (config in pyproject's
        # [tool.coverage.run]). The differential suite re-runs the same programs through the same
        # code, so it adds zero marginal coverage and is intentionally not measured.
        run: uv run pytest --cov=spl --cov-report=xml
      - name: Upload coverage to Codecov
        # Report-only (no gate). Upload once: coverage is identical across 3.13/3.14 (no
        # version-conditional code), so the 3.14 leg would just duplicate the report.
        # fail_ci_if_error stays false so a Codecov outage never breaks the green gate.
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v6.0.1
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  differential:
    name: differential (oracle cross-check, py3.13)
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0   # no floating `v8` major tag yet; pin the exact release
        with:
          version: "0.11.14"
          enable-cache: true
      - name: Sync (locked)
        run: uv sync --locked
      - name: Preflight — fail if the oracle is not actually runnable
        # Guards against a vacuous pass: tests/test_differential.py turns a missing oracle into a
        # GREEN skip in two places (module-level `importorskip("shakespearelang")` and per-test
        # `shutil.which("shakespeare")`). Assert BOTH preconditions hold in the same `--with` env
        # before pytest, so a silently-skipped cross-check can never masquerade as a pass. This is
        # count-independent (unlike `grep '8 passed'`): adding programs never breaks it.
        run: |
          uv run --with shakespearelang python -c "import shakespearelang, shutil, sys; sys.exit(0 if shutil.which('shakespeare') else 1)"
      - name: Differential cross-check
        run: uv run --with shakespearelang pytest -m differential

  web-gate:
    # Fast feedback for the web playground (src/web; see ADR-0010): lint, format-check,
    # typecheck, unit tests + coverage. Runs in parallel with `gate` / `differential`;
    # does NOT need uv or Pyodide assets — vitest fakes the worker (runner.test.ts) and
    # stubs fetch (examples.test.ts). The heavier Playwright run lives in `web-e2e`.
    name: web-gate (lint + typecheck + unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/web/package-lock.json
      - name: Install web deps (locked)
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier (format check)
        run: npm run format:check
      - name: TypeScript (tsc -b)
        run: npm run typecheck
      - name: Vitest (unit + coverage)
        run: npm run test:coverage
      - name: Upload web coverage to Codecov
        # Separate flag from the Python 'spl' upload so the two stay decoupled.
        # Report-only (no gate), mirroring the Python side; a Codecov outage never fails CI.
        uses: codecov/codecov-action@v6.0.1
        with:
          files: ./src/web/coverage/lcov.info
          flags: web
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  web-e2e:
    # Playwright integration gate: builds the dist (the prebuild hook vendors the spl wheel
    # + Pyodide + lark via prepare-assets), runs `vite preview` under COOP/COEP, and drives
    # the playground in headless chromium. Heavy (~3-5 min), runs in parallel with web-gate.
    name: web-e2e (playwright)
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.13"
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0   # prebuild runs `uv build --wheel` for the spl wheel
        with:
          version: "0.11.14"
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/web/package-lock.json
      - name: Install web deps (locked)
        run: npm ci
      - name: Resolve installed Playwright version
        id: pw
        # Cache the browser binaries keyed on the exact installed playwright version so
        # the ~150MB chromium download is skipped on re-runs at the same version.
        run: echo "version=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Playwright chromium (skipped if cached)
        run: npx playwright install --with-deps chromium
      - name: Playwright e2e (build + preview + tests)
        run: npm run e2e
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            src/web/test-results
            src/web/e2e/artifacts
          if-no-files-found: ignore
          retention-days: 7
